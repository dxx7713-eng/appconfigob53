<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu App CONFIG Ob53⚙</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:#fff;
}

/* CENTER */
.center{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    width:320px;
    padding:25px;
    border-radius:20px;
    background:#1a1a1f;
    box-shadow:0 0 20px rgba(255,0,100,0.2);
    text-align:center;
}

/* INPUT */
input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    background:#0f0f14;
    color:#fff;
    margin-top:15px;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    width:100%;
    color:#fff;
    font-weight:bold;
    background:linear-gradient(90deg,#ff7a00,#ff0055);
}

/* ERROR */
.error{
    color:red;
    margin-top:10px;
}

/* LOADING */
#loading{
    display:none;
    text-align:center;
}

.bar{
    width:200px;
    height:8px;
    background:#333;
    border-radius:10px;
    margin:20px auto;
    overflow:hidden;
}
.bar div{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff7a00,#ff0055);
    animation:load 2s linear forwards;
}

@keyframes load{
    to{width:100%;}
}

/* MENU */
#menu{
    display:none;
    padding:15px;
}

.title{
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff7a00,#ff0055);
    -webkit-background-clip:text;
    color:transparent;
}

.section{
    margin-top:20px;
    background:#1a1a1f;
    padding:15px;
    border-radius:15px;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    padding:10px;
    background:#111;
    border-radius:10px;
}

/* TOGGLE */
.toggle{
    width:40px;
    height:20px;
    background:#333;
    border-radius:20px;
    position:relative;
    cursor:pointer;
}
.toggle::after{
    content:'';
    width:16px;
    height:16px;
    background:#fff;
    position:absolute;
    top:2px;
    left:2px;
    border-radius:50%;
}
.toggle.active{
    background:#ff0055;
}
.toggle.active::after{
    left:22px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
    <div class="card">
        <h2>Menu App CONFIG Ob53⚙</h2>
        <p>Developed by Hắc Vê</p>

        <input id="keyInput" placeholder="Vui Lòng Nhập Key Tại Đây... ">
        <button class="btn" onclick="checkKey()">ĐĂNG NHẬP</button>

        <div id="error" class="error"></div>
    </div>
</div>

<!-- LOADING -->
<div id="loading" class="center">
    <div>
        <h2>Loading...</h2>
        <div class="bar"><div></div></div>
    </div>
</div>

<!-- MENU -->
<div id="menu">
    <div class="title">Menu App CONFIG OB53</div>
    <p>Created by Hắc Vê</p>

    <div class="section">
        <h3>Chức Năng Game</h3>

        <div class="item">AimBot <div class="toggle"></div></div>
        <div class="item">AimLock <div class="toggle"></div></div>
        <div class="item">Game Mode <div class="toggle"></div></div>
        <div class="item">Nhẹ Tâm <div class="toggle"></div></div>
        <div class="item">Bám Đầu <div class="toggle"></div></div>
    </div>

    <div class="section">
        <h3>Nâng Cao</h3>

        <div class="item">Giảm Độ Trễ <div class="toggle"></div></div>
        <div class="item">Tối Ưu Thiết Bị <div class="toggle"></div></div>
        <div class="item">Tăng Nhạy <div class="toggle"></div></div>
        <div class="item">Antiband <div class="toggle"></div></div>
        <div class="item">Thao Tác Nhanh <div class="toggle"></div></div>
    </div>
</div>

<script>
// KEY GIẢ LẬP
let validKey = "HACVE-NHVUDO2B6";

// kiểm tra key
function checkKey(){
    let key = document.getElementById("keyInput").value;
    let error = document.getElementById("error");

    let saved = localStorage.getItem("keyTime");

    // nếu đã dùng trước đó
    if(saved){
        let now = Date.now();
        if(now < saved){
            showLoading();
            return;
        }
    }

    if(key === validKey){
        let expire = Date.now() + (24*60*60*1000);
        localStorage.setItem("keyTime", expire);
        showLoading();
    }else{
        error.innerText = "Nhập Sai Vui Lòng Kiểm Tra Lại Key";
    }
}

// loading → menu
function showLoading(){
    document.getElementById("login").style.display="none";
    document.getElementById("loading").style.display="flex";

    setTimeout(()=>{
        document.getElementById("loading").style.display="none";
        document.getElementById("menu").style.display="block";
    },2000);
}

// toggle
document.addEventListener("click",function(e){
    if(e.target.classList.contains("toggle")){
        e.target.classList.toggle("active");
    }
});
</script>

</body>
</html>
